<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staggered – Handicap Running Challenges</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
    }
    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(160deg, #05b05a 0%, #008148 100%);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      font-size: 40px;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    p  { font-size: 16px; color: #6e6e73; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      background: #008148;
      color: #fff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 14px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .sub { margin-top: 16px; font-size: 13px; color: #aeaeb2; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🏃</div>
    <h1>Staggered</h1>
    <p>Handicap running challenges — race your friends fairly, no matter your pace.</p>
    <a class="btn" href="https://apps.apple.com/app/staggered/id000000000">
      Download on the App Store
    </a>
    <p class="sub">Available for iPhone &amp; Apple Watch</p>
  </div>
</body>
</html>
