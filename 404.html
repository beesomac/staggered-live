<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staggered</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
    }
    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(160deg, #05b05a 0%, #008148 100%);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      font-size: 40px;
    }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 12px; }
    p  { font-size: 16px; color: #6e6e73; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: #008148;
      color: #fff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 14px;
      transition: opacity 0.15s;
      margin-bottom: 12px;
    }
    .btn:hover { opacity: 0.85; }
    .btn-open {
      display: inline-block;
      background: transparent;
      color: #008148;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 10px 24px;
      border: 2px solid #008148;
      border-radius: 14px;
      transition: opacity 0.15s;
    }
    .btn-open:hover { opacity: 0.75; }
    .sub { margin-top: 20px; font-size: 13px; color: #aeaeb2; }
    .actions { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  </style>
  <script>
    (function () {
      var path = window.location.pathname;          // e.g. /invite/<uuid>
      var parts = path.split('/').filter(Boolean);  // ["invite", "<uuid>"]
      var kind = parts[0];                          // "invite" or "join"
      var uuid = parts[1] || '';
      var isInvite = (kind === 'invite');
      var isJoin   = (kind === 'join');

      // Use the runhandicap:// custom URL scheme — Safari WILL hand this
      // off to the app even when we're already on staggered.live, which
      // is something it refuses to do for a same-domain Universal Link.
      window.__deepLink = (isInvite || isJoin)
        ? ('runhandicap://' + kind + '/' + uuid)
        : null;

      document.addEventListener('DOMContentLoaded', function () {
        var h1 = document.getElementById('heading');
        var sub = document.getElementById('subtext');
        var openBtn = document.getElementById('btn-open');

        if (isInvite) {
          h1.textContent  = "You've got a friend request!";
          sub.textContent = "Open Staggered to accept and start running together.";
        } else if (isJoin) {
          h1.textContent  = "You've been invited to a challenge!";
          sub.textContent = "Open Staggered to join the handicap run.";
        }

        if (window.__deepLink) {
          openBtn.style.display = 'inline-block';
          openBtn.href = window.__deepLink;
        }
      });
    })();
  </script>
</head>
<body>
  <div class="card">
    <div class="icon">🏃</div>
    <h1 id="heading">Open this link in Staggered</h1>
    <p id="subtext">Download the app to get started with handicap running challenges.</p>
    <div class="actions">
      <a id="btn-open" class="btn-open" href="#" style="display:none">
        Open in Staggered
      </a>
      <a class="btn" href="https://apps.apple.com/app/staggered/id000000000">
        Download on the App Store
      </a>
    </div>
    <p class="sub">Available for iPhone &amp; Apple Watch</p>
  </div>
</body>
</html>
